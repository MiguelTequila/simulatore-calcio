<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>⚽ Simulatore Predittivo di Partite</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css" />
  <style>
    #loading { font-family: sans-serif; text-align: center; padding: 3rem; color: #555; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      ⚽ Caricamento del motore Python nel browser…<br/>
      La prima apertura richiede 15–30 secondi (download di Pyodide + scipy).
    </div>
  </div>

  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

    // Versione a file unico: l'app viene caricata direttamente dal repo.
    mount(
      {
        requirements: ["scipy", "pandas"],
        entrypoint: "app_streamlit.py",
        files: {
          "app_streamlit.py": {
            url: "./app_streamlit.py",
            opts: { encoding: "utf8" },
          },
        },
        streamlitConfig: { "client.toolbarMode": "viewer" },
      },
      document.getElementById("root"),
    );
  </script>
</body>
</html>
